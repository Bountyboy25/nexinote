<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
  </head>
  <body>
    <!--
      This is the ONLY HTML file in the entire app.
      React mounts into this single <div id="root">.
      Everything you see on screen is generated by JavaScript.
      This pattern is called a "Single Page Application" (SPA).
    -->
    <div id="root"></div>

    <!--
      This script tag loads our entire app.
      Vite replaces this with the bundled output in production.
      In dev, it points to the source file directly.
    -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
